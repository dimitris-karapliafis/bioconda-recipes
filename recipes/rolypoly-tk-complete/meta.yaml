{% set name = "rolypoly-tk-complete" %}
{% set version = "0.7.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # Metapackage: source used only to ship the upstream GPL license file
  url: https://github.com/UriNeri/rolypoly/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 9acc23cd3f4d73dbf699b4809bdf3858804012415eba6a932f3321fe5cc20e87

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  run:
    - rolypoly-tk-core >={{ version }},<0.8
    # Extend (rolypoly extend) — re-enable when pydustmasker 2.x has py310-313 builds on bioconda
    # - pydustmasker >=2.0.0,<3
    # Reads (pixi feature: reads)
    - seqkit >=2.10.0,<3
    - bowtie >=1.3.1,<2
    - falco >=1.2.5,<2
    - pigz >=2.8,<3
    # Assembly (pixi feature: assembly)
    - spades >=4.2.0,<5
    - megahit >=1.2.9,<2
    - plass >=5.cf8933,<6
    # Annotation RNA (pixi feature: annotation-rna)
    - infernal >=1.1.5,<2
    - linearfold >=1.0.1.dev20220829,<2
    - aragorn >=1.2.41,<2
    - trnascan-se >=2.0.12,<3
    # Annotation prot + identify (pixi features: annotation-prot, identify)
    - mmseqs2 >=18.8cc5c,<19
    - diamond >=2.1.12,<3
    # Cluster (pixi feature: cluster)
    - blast >=2.17.0,<3
    - python-igraph >=1.0.0,<2
    - leidenalg >=0.11.0,<0.12
    - pyskani >=0.2.0,<0.3
    - pyfastani >=0.6.1,<0.7
    # Misc (pixi feature: misc)
    - aria2 >=1.37.0,<2

test:
  imports:
    - rolypoly
  commands:
    # Top-level CLI
    - rolypoly --help
    - rolypoly version

    # Setup and Data (pixi: default)
    - rolypoly get-data --help

    # Raw Reads Processing (pixi: reads)
    - rolypoly filter-reads --help
    - rolypoly shrink-reads --help
    - rolypoly mask-dna --help
    - seqkit version --help
    - bowtie --help
    - falco
    - pigz --version 2>&1 | grep -i pigz

    # Meta/Genome Assembly (pixi: assembly)
    - rolypoly assemble --help
    - rolypoly filter-contigs --help
    - rolypoly extend --help
    - spades.py --version 2>&1 | grep -i spades
    - megahit --help
    - plass > /dev/null

    # Genome Annotation (pixi: annotation-rna, annotation-prot)
    - rolypoly annotate --help
    - rolypoly annotate-rna --help
    - rolypoly annotate-prot --help
    - cmscan -h 2>&1 | grep -i cmscan
    - command -v linearfold
    - aragorn
    - tRNAscan-SE -h

    # RNA Virus Identification (pixi: identify)
    - rolypoly marker-search --help
    - rolypoly virus-mapping --help
    - rolypoly rdrp-motif-search --help
    - mmseqs > /dev/null
    - diamond --help 2>&1 > /dev/null

    # Binning / clustering (pixi: cluster)
    - rolypoly termini --help
    - rolypoly correlate --help
    - rolypoly cluster --help
    - rolypoly binit --help
    - blastn -version > /dev/null
    - python -c "import igraph, leidenalg, pyskani, pyfastani; print('cluster deps ok')"

    # Miscellaneous (pixi: misc)
    - rolypoly roll --help
    - rolypoly fetch-sra --help
    - rolypoly fastx-stats --help
    - rolypoly fastx-calc --help
    - rolypoly rename-seqs --help
    - aria2c --version 2>&1 | grep -i aria2

about:
  home: https://github.com/UriNeri/rolypoly
  doc_url: https://urineri.github.io/rolypoly/
  dev_url: https://github.com/UriNeri/rolypoly
  summary: Meta-package for RolyPoly with full CLI and clustering stack
  description: |
    Installs rolypoly-tk-core together with external command-line tools and
    Python libraries required for the full RolyPoly workflow, including
    read processing, assembly, RNA/protein annotation, virus identification,
    and contig clustering (rolypoly cluster). Individual bundled tools may use
    other licenses.
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE

extra:
  recipe-maintainers:
    - dimitris-karapliafis
    - UriNeri
